<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="hls.min.js"></script>
  <style>
    html, body {
      margin: 0;
      background: black;
      height: 100%;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .clock-overlay {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 10;
      color: black;
      background: rgba(255, 255, 255, 0.75);
      padding: 12px 14px;
      border-radius: 6px;
      font: 700 28px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0.02em;
      text-align: right;
    }
  </style>
</head>
<body>
  <video id="video" autoplay muted playsinline crossorigin="anonymous"></video>
  <div id="clock" class="clock-overlay" aria-live="off"></div>

  <script>
    const video = document.getElementById('video');
    const clock = document.getElementById('clock');
    const src = 'https://camsecure.co/HLS/weymouthsailing.m3u8';
    let hls;

    function updateClock() {
      const now = new Date();
      const formatted = now.toLocaleString(undefined, {
        weekday: 'short',
        year: 'numeric',
        month: 'short',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
      clock.textContent = formatted;
    }

    updateClock();
    setInterval(updateClock, 1000);

    function tryPlay() {
      const playPromise = video.play();
      if (playPromise && typeof playPromise.catch === 'function') {
        playPromise.catch(() => {
          // UC Cast/kiosk browsers can temporarily reject autoplay; retry shortly.
          setTimeout(() => video.play().catch(() => {}), 1000);
        });
      }
    }

    function attachCommonRecovery() {
      video.addEventListener('stalled', () => {
        if (hls && Number.isFinite(video.currentTime)) {
          hls.startLoad();
          video.currentTime = Math.max(0, video.currentTime - 0.1);
          tryPlay();
        }
      });

      video.addEventListener('pause', () => {
        // Keep playback alive for unattended display playback.
        if (!video.ended) {
          tryPlay();
        }
      });
    }

    if (window.Hls && Hls.isSupported()) {
      hls = new Hls({
        liveSyncDurationCount: 3,
        liveMaxLatencyDurationCount: 10,
        maxLiveSyncPlaybackRate: 1.2,
        backBufferLength: 30,
        maxBufferLength: 20,
        lowLatencyMode: false
      });

      hls.attachMedia(video);
      hls.on(Hls.Events.MEDIA_ATTACHED, () => {
        hls.loadSource(src);
      });

      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        tryPlay();
      });

      hls.on(Hls.Events.ERROR, (_, data) => {
        if (!data.fatal) {
          return;
        }

        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
          hls.startLoad();
        } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
          hls.recoverMediaError();
        } else {
          hls.destroy();
          setTimeout(() => window.location.reload(), 1500);
        }
      });

      attachCommonRecovery();
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = src;
      video.addEventListener('loadedmetadata', tryPlay);
      attachCommonRecovery();
    }
  </script>
</body>
</html>
