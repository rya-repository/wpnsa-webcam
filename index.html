<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    html, body {
      margin: 0;
      background: black;
      height: 100%;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <video id="video" autoplay muted playsinline></video>

  <script>
    const video = document.getElementById('video');
    const src = 'https://camsecure.co/HLS/weymouthsailing.m3u8';
    let hls;

    function tryPlay() {
      const playPromise = video.play();
      if (playPromise && typeof playPromise.catch === 'function') {
        playPromise.catch(() => {
          // UC Cast/kiosk browsers can temporarily reject autoplay; retry shortly.
          setTimeout(() => video.play().catch(() => {}), 1000);
        });
      }
    }

    function attachCommonRecovery() {
      video.addEventListener('stalled', () => {
        if (hls && Number.isFinite(video.currentTime)) {
          hls.startLoad();
          video.currentTime = Math.max(0, video.currentTime - 0.1);
          tryPlay();
        }
      });

      video.addEventListener('pause', () => {
        // Keep playback alive for unattended display playback.
        if (!video.ended) {
          tryPlay();
        }
      });
    }

    if (window.Hls && Hls.isSupported()) {
      hls = new Hls({
        liveSyncDurationCount: 3,
        liveMaxLatencyDurationCount: 10,
        maxLiveSyncPlaybackRate: 1.2,
        backBufferLength: 30,
        maxBufferLength: 20,
        lowLatencyMode: false
      });

      hls.attachMedia(video);
      hls.on(Hls.Events.MEDIA_ATTACHED, () => {
        hls.loadSource(src);
      });

      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        tryPlay();
      });

      hls.on(Hls.Events.ERROR, (_, data) => {
        if (!data.fatal) {
          return;
        }

        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
          hls.startLoad();
        } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
          hls.recoverMediaError();
        } else {
          hls.destroy();
          setTimeout(() => window.location.reload(), 1500);
        }
      });

      attachCommonRecovery();
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = src;
      video.addEventListener('loadedmetadata', tryPlay);
      attachCommonRecovery();
    }
  </script>
</body>
</html>
