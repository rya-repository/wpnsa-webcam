<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="hls.min.js"></script>
  <style>
    html, body {
      margin: 0;
      background: black;
      height: 100%;
    }
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }
    .panel {
      position: relative;
      overflow: hidden;
      background: #000;
    }
    .webcam-panel {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .video-panel iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
    .video-fallback {
      display: none;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      padding: 24px;
      place-content: center;
      gap: 10px;
      color: #fff;
      text-align: center;
      font: 500 16px/1.4 "Segoe UI", sans-serif;
      background: #0f0f0f;
    }
    .video-fallback a {
      color: #8ecbff;
    }
    .status-overlay {
      position: absolute;
      left: 12px;
      bottom: 12px;
      z-index: 10;
      color: #fff;
      background: rgba(0, 0, 0, 0.6);
      padding: 8px 10px;
      border-radius: 6px;
      font: 500 12px/1.4 "Segoe UI", sans-serif;
      max-width: 70vw;
      white-space: pre-line;
    }
    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
      }
      .status-overlay {
        max-width: 92vw;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <section class="panel webcam-panel" aria-label="Webcam stream">
      <video id="video" autoplay muted playsinline crossorigin="anonymous"></video>
      <div id="status" class="status-overlay">Starting...</div>
    </section>
    <section class="panel video-panel" aria-label="YouTube video">
      <iframe id="youtubeFrame" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
      <div id="youtubeFallback" class="video-fallback" role="note" aria-live="polite">
        <div>YouTube embed is blocked from local file pages (Error 153).</div>
        <div>Run this folder from a local web server, then open it in the browser.</div>
        <div>Example command in this folder: <strong>py -m http.server 8080</strong></div>
        <div>Then open <a href="http://localhost:8080/" target="_blank" rel="noopener noreferrer">http://localhost:8080/</a></div>
      </div>
    </section>
  </div>

  <script src="webcam.js"></script>
  <script>
    (function configureYouTubeEmbed() {
      const frame = document.getElementById('youtubeFrame');
      const fallback = document.getElementById('youtubeFallback');
      const videoId = 'Fb6s9NQ3r6Q';
      const params = new URLSearchParams({
        autoplay: '1',
        mute: '1',
        controls: '0',
        rel: '0',
        modestbranding: '1',
        playsinline: '1'
      });

      if (window.location.protocol === 'file:') {
        frame.style.display = 'none';
        fallback.style.display = 'grid';
        return;
      }

      params.set('origin', window.location.origin);
      frame.src = 'https://www.youtube-nocookie.com/embed/' + videoId + '?' + params.toString();
    })();
  </script>
</body>
</html>
